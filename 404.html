<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pragati Ranjan</title>
    <!--
      GitHub Pages SPA fallback (rafgraph/spa-github-pages).
      GH Pages serves this for any path that isn't a real file. It rewrites the
      requested path into a query string and redirects to "/", where the decode
      snippet in index.html restores the original URL and React Router takes over.
      pathSegmentsToKeep = 0 because the site is served at the domain root.
    -->
    <script>
      (function () {
        var pathSegmentsToKeep = 0;
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
              .split("/")
              .slice(0, 1 + pathSegmentsToKeep)
              .join("/") +
            "/?/" +
            l.pathname
              .slice(1)
              .split("/")
              .slice(pathSegmentsToKeep)
              .join("/")
              .replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
