<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git From The Inside Out — Build Your Own Version Control</title>
<link rel="icon" type="image/png" sizes="32x32" href="/icon.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icon.png">
<link rel="apple-touch-icon" href="/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== Neo-brutalist design system (white / black / #ccff00) ===== */
  :root{
    --bg:#ffffff; --ink:#000000; --accent:#ccff00; --muted:#555555;
    --dark:#000000;            /* inverted code/terminal surfaces */
    --green:#16a34a; --red:#dc2626;
    --mono:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;
    --sans:'Space Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --sh:6px 6px 0 0 #000; --sh-sm:4px 4px 0 0 #000;
    /* legacy aliases (old inline styles map onto the brutalist palette) */
    --txt:#000; --dim:#555; --border:#000; --panel:#fff; --panel2:#f1f1f1;
    --acc:#000; --acc2:#000; --orange:#000; --yellow:#caa700;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.6;font-size:16px}
  a{color:var(--ink);text-decoration:underline;text-decoration-thickness:2px;font-weight:700}
  a:hover{background:var(--accent)}
  /* italics slant into following upright punctuation — add a hair of trailing space */
  em,i{font-style:italic;padding-right:.08em}
  code,kbd{font-family:var(--mono);background:#f1f1f1;border:2px solid var(--ink);padding:0 5px;border-radius:0;font-size:.85em;color:var(--ink);font-weight:700}
  h1,h2,h3{line-height:1.2}
  h2{font-size:1.85rem;margin:.1em 0 .5em;font-weight:700;text-transform:uppercase;letter-spacing:-.02em;
    display:inline-block;border-bottom:8px solid var(--accent);padding-bottom:.08em}
  h3{color:var(--ink);margin:1.6em 0 .4em;font-size:1.18rem;font-weight:700;text-transform:uppercase}

  /* ===== Header ===== */
  header{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:16px;
    padding:12px 20px;background:#fff;border-bottom:4px solid var(--ink)}
  .brand{font-weight:700;font-size:1.05rem;text-transform:uppercase;letter-spacing:-.02em;white-space:nowrap}
  .brand b{background:var(--accent);padding:0 5px;border:2px solid var(--ink)}
  .stats{margin-left:auto;display:flex;align-items:center;gap:14px}
  .stat{display:flex;align-items:center;gap:6px;font-size:.78rem;font-weight:700;text-transform:uppercase;font-family:var(--mono)}
  .stat b{font-variant-numeric:tabular-nums}
  .ring{--p:0;width:40px;height:40px;border-radius:50%;border:3px solid var(--ink);
    background:conic-gradient(var(--accent) calc(var(--p)*1%), #fff 0);
    display:grid;place-items:center;font-size:.6rem;font-weight:700}
  .ring span{width:28px;height:28px;border-radius:50%;background:#fff;display:grid;place-items:center;border:1px solid var(--ink)}
  .btn{background:#fff;border:3px solid var(--ink);color:var(--ink);padding:6px 12px;box-shadow:var(--sh-sm);
    border-radius:0;cursor:pointer;font-size:.78rem;font-family:var(--sans);font-weight:700;text-transform:uppercase;transition:.08s}
  .btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 0 #000;background:var(--accent)}
  .btn:active{transform:translate(2px,2px);box-shadow:0 0 0 0 #000}
  .btn.primary{background:var(--accent)}
  .flame.on{filter:drop-shadow(0 0 4px var(--accent))}

  /* ===== Layout ===== */
  .wrap{display:flex;max-width:1280px;margin:0 auto}
  nav{width:280px;flex-shrink:0;padding:18px 10px 60px;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto;border-right:4px solid var(--ink)}
  nav .part{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--ink);margin:18px 12px 6px;font-weight:700;font-family:var(--mono);background:var(--accent);display:inline-block;padding:2px 6px}
  nav a{display:flex;align-items:center;gap:9px;padding:7px 12px;border-radius:0;color:var(--ink);
    text-decoration:none;font-size:.85rem;font-weight:600;cursor:pointer;border:2px solid transparent}
  nav a:hover{background:#f1f1f1;border-color:var(--ink)}
  nav a.active{background:var(--accent);border-color:var(--ink)}
  nav a .dot{width:16px;height:16px;border-radius:0;border:2px solid var(--ink);flex-shrink:0;display:grid;place-items:center;font-size:.6rem;background:#fff}
  nav a.done .dot{background:var(--ink);color:var(--accent)}
  main{flex:1;min-width:0;padding:30px 42px 120px;max-width:900px}

  .lesson-tag{font-size:.72rem;letter-spacing:1px;text-transform:uppercase;color:var(--ink);font-weight:700;font-family:var(--mono);background:var(--accent);display:inline-block;padding:2px 7px;border:2px solid var(--ink)}
  p{margin:.7em 0}
  .lead{font-size:1.08rem;color:#222}
  ul,ol{padding-left:22px} li{margin:.3em 0} li::marker{color:var(--ink)}
  ul{list-style:square}
  .callout{border:3px solid var(--ink);border-left:10px solid var(--ink);background:#fff;padding:13px 16px;border-radius:0;margin:1.3em 0;box-shadow:var(--sh-sm)}
  .callout.aha{background:var(--accent);border-left-color:var(--ink)}
  .callout.warn{border-left-color:var(--accent)}
  .callout .k{font-weight:700;color:var(--ink);display:block;margin-bottom:3px;font-size:.76rem;letter-spacing:.5px;text-transform:uppercase;font-family:var(--mono)}
  .cliff{margin-top:2.4em;padding:16px 18px;border:4px dashed var(--ink);border-radius:0;background:#fff}
  .cliff .k{color:var(--ink);font-weight:700;font-size:.76rem;letter-spacing:1px;text-transform:uppercase;font-family:var(--mono);background:var(--accent);padding:2px 6px}

  table{border-collapse:collapse;width:100%;margin:1em 0;font-size:.9rem;border:3px solid var(--ink)}
  th,td{border:2px solid var(--ink);padding:8px 11px;text-align:left}
  th{background:var(--accent);color:var(--ink);text-transform:uppercase;font-weight:700;font-family:var(--mono);font-size:.82rem}

  /* ===== Widgets ===== */
  .widget{margin:1.7em 0;border:3px solid var(--ink);border-radius:0;overflow:hidden;background:#fff;box-shadow:var(--sh)}
  .widget-head{padding:9px 14px;background:#fff;font-size:.74rem;letter-spacing:.5px;color:var(--ink);font-family:var(--mono);
    display:flex;align-items:center;gap:8px;border-bottom:3px solid var(--ink);font-weight:700}
  .widget-head .lbl{margin-right:auto;text-transform:uppercase;font-weight:700}
  .dots{display:flex;gap:5px} .dots i{width:11px;height:11px;border-radius:0;border:2px solid var(--ink);display:inline-block}
  .dots i:nth-child(1){background:var(--accent)}.dots i:nth-child(2){background:#fff}.dots i:nth-child(3){background:var(--ink)}

  /* terminal — inverted (black) console block */
  .term{font-family:var(--mono);font-size:.85rem;background:var(--dark)}
  .term-out{padding:12px 14px;min-height:120px;max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;color:#e8e8e8}
  .term-out .cmd{color:var(--accent)} .term-out .cmd::before{content:"$ ";color:#888}
  .term-out .err{color:#ff6b6b} .term-out .info{color:#aaa} .term-out .hl{color:var(--accent)}
  .term-in{display:flex;align-items:center;border-top:2px solid #333;padding:6px 10px;background:#000}
  .term-in span{color:#888;margin-right:6px}
  .term-in input{flex:1;background:none;border:none;outline:none;color:var(--accent);font-family:var(--mono);font-size:.85rem}
  .term-graph{border-top:3px solid var(--ink);padding:10px;background:#fff;overflow-x:auto}
  .term-graph svg{display:block}
  .chiprow{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;border-top:2px solid #333;background:#000}
  .chip{font-family:var(--mono);font-size:.72rem;background:transparent;border:2px solid var(--accent);color:var(--accent);
    padding:3px 8px;border-radius:0;cursor:pointer;font-weight:700}
  .chip:hover{background:var(--accent);color:#000}

  /* stepper — white diagram canvas */
  .stepper svg{width:100%;height:auto;display:block;background:#fff}
  .step-cap{padding:11px 16px;font-size:.92rem;min-height:46px;border-top:3px solid var(--ink)}
  .step-ctrl{display:flex;align-items:center;gap:10px;padding:8px 14px;border-top:3px solid var(--ink);background:#fff}
  .step-ctrl .spacer{margin-left:auto;font-size:.74rem;color:var(--muted);font-family:var(--mono)}
  .pips{display:flex;gap:5px}.pips i{width:9px;height:9px;border-radius:0;border:1.5px solid var(--ink);background:#fff}.pips i.on{background:var(--ink)}

  /* quiz */
  .quiz{padding:15px 16px}
  .quiz .q{font-weight:700;margin-bottom:10px}
  .opt{display:block;width:100%;text-align:left;background:#fff;border:3px solid var(--ink);color:var(--ink);
    padding:10px 13px;border-radius:0;margin:8px 0;cursor:pointer;font-size:.9rem;font-weight:600;transition:.08s;font-family:inherit;box-shadow:var(--sh-sm)}
  .opt:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 0 #000;background:var(--accent)}
  .opt.correct{background:var(--accent);color:var(--ink);transform:none;box-shadow:var(--sh-sm)}
  .opt.wrong{background:var(--red);color:#fff;transform:none;box-shadow:var(--sh-sm)}
  .opt:disabled{cursor:default}
  .quiz-type{display:flex;gap:8px;margin:8px 0}
  .quiz-type input{flex:1;background:#fff;border:3px solid var(--ink);color:var(--ink);font-family:var(--mono);font-weight:700;
    padding:9px 11px;border-radius:0;font-size:.85rem;outline:none}
  .quiz-type input:focus{background:#fafff0}
  .feedback{margin-top:10px;font-size:.88rem;padding:10px 12px;border-radius:0;display:none;border:3px solid var(--ink)}
  .feedback.show{display:block}
  .feedback.ok{background:var(--accent);color:var(--ink)} .feedback.no{background:#ffd7d4;color:var(--ink)}

  /* playground — inverted (black) code editor */
  .pg-code{width:100%;background:var(--dark);border:none;color:#e8e8e8;font-family:var(--mono);font-size:.84rem;
    padding:12px 14px;resize:vertical;min-height:120px;outline:none;line-height:1.5;display:block}
  .pg-out{border-top:2px solid #333;padding:10px 14px;font-family:var(--mono);font-size:.82rem;background:#000;
    white-space:pre-wrap;color:#aaa;min-height:24px;max-height:240px;overflow:auto}
  .pg-out .v{color:var(--accent)} .pg-out .e{color:#ff6b6b}

  /* predict */
  .predict{border:3px solid var(--ink);border-left:10px solid var(--accent);border-radius:0;padding:13px 15px;margin:1.4em 0;background:#fff;box-shadow:var(--sh-sm)}
  .predict .k{color:var(--ink);font-weight:700;font-size:.74rem;letter-spacing:1px;text-transform:uppercase;font-family:var(--mono)}
  .reveal{display:none;margin-top:10px;padding-top:10px;border-top:3px solid var(--ink)}
  .reveal.show{display:block}

  .complete-bar{display:flex;align-items:center;gap:14px;margin:2.5em 0 1em;padding:16px;border-radius:0;
    background:#fff;border:3px solid var(--ink);box-shadow:var(--sh)}
  .complete-bar .txt{margin-right:auto}
  .pagebtns{display:flex;justify-content:space-between;margin-top:30px;gap:12px}

  /* modal (flashcards) */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;place-items:center;z-index:100}
  .modal.show{display:grid}
  .card{width:min(460px,92vw);background:#fff;border:4px solid var(--ink);border-radius:0;padding:24px;text-align:center;box-shadow:10px 10px 0 0 #000}
  .card .front{font-size:1.15rem;margin:14px 0 20px;min-height:60px;display:grid;place-items:center;font-weight:600}
  .card .back{display:none;color:var(--accent);font-family:var(--mono);font-size:.95rem;margin-bottom:18px;padding:12px;background:var(--dark);border-radius:0}
  .card .back.show{display:block}
  .card .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .badge{font-size:.68rem;background:var(--accent);border:2px solid var(--ink);padding:3px 9px;border-radius:0;color:var(--ink);font-family:var(--mono);font-weight:700;text-transform:uppercase}

  .hero{text-align:center;padding:30px 0 10px}
  .hero h2{font-size:2.4rem;border-bottom-width:10px}
  .pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:18px 0}
  .pill{font-size:.74rem;background:#fff;border:2px solid var(--ink);padding:6px 12px;border-radius:0;color:var(--ink);font-weight:700;font-family:var(--mono);text-transform:uppercase}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:1.4em 0}
  @media(max-width:860px){.wrap{flex-direction:column}nav{width:100%;height:auto;position:static;border-right:none;border-bottom:4px solid var(--ink)}main{padding:22px 18px 100px}.grid2{grid-template-columns:1fr}.stats .stat.hideable{display:none}}
  ::-webkit-scrollbar{width:12px;height:12px}::-webkit-scrollbar-thumb{background:var(--ink);border-radius:0;border:2px solid #fff}::-webkit-scrollbar-track{background:#f1f1f1}
</style>
</head>
<body>
<header>
  <a href="/blog" class="btn" style="text-decoration:none" title="Back to blog">←</a>
  <div class="brand">git <b>// inside out</b></div>
  <div class="stats">
    <div class="stat hideable" title="Experience points">⚡ <b id="xp">0</b> XP</div>
    <div class="stat hideable" title="Day streak">🔥 <b id="streak">0</b></div>
    <button class="btn" id="reviewBtn">🔁 Review <b id="dueCount" style="color:var(--orange)">0</b></button>
    <div class="ring" id="ring"><span id="ringTxt">0%</span></div>
  </div>
</header>

<div class="wrap">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>

<div class="modal" id="cardModal">
  <div class="card">
    <span class="badge" id="cardBox">box 1</span>
    <div class="front" id="cardFront"></div>
    <div class="back" id="cardBack"></div>
    <div class="row" id="cardRow">
      <button class="btn primary" id="cardFlip">Flip card</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* ============================================================================
   PART A — VERIFIED GIT CRYPTO CORE
   Pure-JS SHA-1 over bytes. Produces hashes identical to real `git`.
   (Verified against: git hash-object, git write-tree.)
   ========================================================================== */
function sha1bytes(bytes){
  const ml=bytes.length*8, withOne=bytes.length+1;
  const padLen=((56-(withOne%64))+64)%64, total=withOne+padLen+8;
  const msg=new Uint8Array(total); msg.set(bytes,0); msg[bytes.length]=0x80;
  const dv=new DataView(msg.buffer);
  dv.setUint32(total-4, ml>>>0, false);
  dv.setUint32(total-8, Math.floor(ml/0x100000000), false);
  let h0=0x67452301,h1=0xEFCDAB89,h2=0x98BADCFE,h3=0x10325476,h4=0xC3D2E1F0;
  const w=new Uint32Array(80), rotl=(n,s)=>(n<<s)|(n>>>(32-s));
  for(let i=0;i<total;i+=64){
    for(let j=0;j<16;j++) w[j]=dv.getUint32(i+j*4,false);
    for(let j=16;j<80;j++) w[j]=rotl(w[j-3]^w[j-8]^w[j-14]^w[j-16],1);
    let a=h0,b=h1,c=h2,d=h3,e=h4;
    for(let j=0;j<80;j++){
      let f,k;
      if(j<20){f=(b&c)|(~b&d);k=0x5A827999;}
      else if(j<40){f=b^c^d;k=0x6ED9EBA1;}
      else if(j<60){f=(b&c)|(b&d)|(c&d);k=0x8F1BBCDC;}
      else{f=b^c^d;k=0xCA62C1D6;}
      const t=(rotl(a,5)+f+e+k+w[j])>>>0;
      e=d;d=c;c=rotl(b,30)>>>0;b=a;a=t;
    }
    h0=(h0+a)>>>0;h1=(h1+b)>>>0;h2=(h2+c)>>>0;h3=(h3+d)>>>0;h4=(h4+e)>>>0;
  }
  const hx=n=>('00000000'+(n>>>0).toString(16)).slice(-8);
  return hx(h0)+hx(h1)+hx(h2)+hx(h3)+hx(h4);
}
const enc=new TextEncoder();
function utf8(s){return enc.encode(s);}
function cat(...a){let n=0;for(const x of a)n+=x.length;const o=new Uint8Array(n);let p=0;for(const x of a){o.set(x,p);p+=x.length;}return o;}
function hex2bytes(h){const b=new Uint8Array(h.length/2);for(let i=0;i<b.length;i++)b[i]=parseInt(h.substr(i*2,2),16);return b;}
// sha1( "<type> <len>\0" + content ) — exactly what git does.
function gitHashObject(type, contentBytes){
  if(typeof contentBytes==='string') contentBytes=utf8(contentBytes);
  return sha1bytes(cat(utf8(`${type} ${contentBytes.length}\0`), contentBytes));
}
function gitHashTree(entries){ // [{mode,name,hash}]
  const s=[...entries].sort((a,b)=>a.name<b.name?-1:1), parts=[];
  for(const e of s){ parts.push(utf8(`${e.mode} ${e.name}\0`)); parts.push(hex2bytes(e.hash)); }
  return gitHashObject('tree', cat(...parts));
}
function short(h){return h?h.slice(0,7):'';}

/* ============================================================================
   PART B — MiniGit ENGINE
   An in-memory version-control engine. Everything is objects + refs.
   This SAME engine powers the simulated terminal in early lessons AND is the
   thing you rebuild by hand in the capstone. (The big reveal: you've been
   driving it the whole time.)
   ========================================================================== */
function MiniGit(){
  const repo={
    objects:new Map(),     // hash -> {type, ...}
    refs:new Map(),        // 'refs/heads/main' -> commit hash
    HEAD:'refs/heads/main',// either a ref path or {detached:hash}
    work:new Map(),        // filename -> content (working directory)
    index:new Map(),       // filename -> blob hash (staging area)
    initialized:false,
    clock:0,               // deterministic timestamp counter
  };
  const api={};
  function store(type,content,extra){ const h=gitHashObject(type, typeof content==='string'?content:content); repo.objects.set(h,Object.assign({type,content},extra)); return h; }
  function curBranch(){ return (typeof repo.HEAD==='string' && repo.HEAD.startsWith('refs/heads/'))?repo.HEAD.slice('refs/heads/'.length):null; }
  function headCommit(){ if(typeof repo.HEAD==='object') return repo.HEAD.detached; return repo.refs.get(repo.HEAD)||null; }
  function ancestors(h){ const seen=new Set(); const stk=h?[h]:[]; while(stk.length){const c=stk.pop(); if(!c||seen.has(c))continue; seen.add(c); const o=repo.objects.get(c); if(o&&o.parents)stk.push(...o.parents);} return seen; }

  api.repo=repo;
  api.init=()=>{ if(repo.initialized) return {info:'Reinitialized existing MiniGit repository'}; repo.initialized=true; repo.HEAD='refs/heads/main'; return {info:'Initialized empty MiniGit repository (branch: main)'}; };
  api.writeFile=(name,content)=>{ repo.work.set(name,content); return {info:`wrote ${name}`}; };
  api.add=(name)=>{
    if(!repo.initialized) return {err:'not a git repository (run: git init)'};
    let names = name==='.' ? [...repo.work.keys()] : [name];
    if(name!=='.' && !repo.work.has(name)) return {err:`pathspec '${name}' did not match any files`};
    for(const n of names){ const h=gitHashObject('blob', repo.work.get(n)); repo.objects.set(h,{type:'blob',content:repo.work.get(n)}); repo.index.set(n,h); }
    return {info:`staged ${names.join(', ')}`};
  };
  api.commit=(msg)=>{
    if(!repo.initialized) return {err:'not a git repository (run: git init)'};
    if(repo.index.size===0) return {err:'nothing to commit (use "git add")'};
    const entries=[...repo.index.entries()].map(([name,hash])=>({mode:'100644',name,hash}));
    const tree=gitHashTree(entries);
    repo.objects.set(tree,{type:'tree',entries});
    const parent=headCommit();
    const parents=parent?[parent]:[];
    const ts=1700000000+(repo.clock++)*60;
    const body=`tree ${tree}\n`+parents.map(p=>`parent ${p}\n`).join('')+`author You <you@local> ${ts} +0000\ncommitter You <you@local> ${ts} +0000\n\n${msg}\n`;
    const h=gitHashObject('commit', body);
    repo.objects.set(h,{type:'commit',tree,parents,message:msg,ts});
    const br=curBranch();
    if(br) repo.refs.set('refs/heads/'+br, h); else repo.HEAD={detached:h};
    return {info:`[${br||'detached'} ${short(h)}] ${msg}`,hash:h};
  };
  api.branch=(name)=>{
    if(!name){ const out=[...repo.refs.keys()].filter(k=>k.startsWith('refs/heads/')).map(k=>{const b=k.slice(11);return (b===curBranch()?'* ':'  ')+b;}).join('\n'); return {info:out||'(no branches yet — make a commit)'}; }
    const c=headCommit(); if(!c) return {err:'cannot create branch before first commit'};
    if(repo.refs.has('refs/heads/'+name)) return {err:`branch '${name}' already exists`};
    repo.refs.set('refs/heads/'+name,c); return {info:`created branch ${name} at ${short(c)}`};
  };
  api.checkout=(name,create)=>{
    if(create){ const r=api.branch(name); if(r.err) return r; }
    if(!repo.refs.has('refs/heads/'+name)) return {err:`pathspec '${name}' did not match`};
    repo.HEAD='refs/heads/'+name;
    // load tree into index/work (snapshot)
    const c=headCommit(); repo.index.clear();
    if(c){ const t=repo.objects.get(repo.objects.get(c).tree); if(t&&t.entries){ for(const e of t.entries){ repo.index.set(e.name,e.hash); const blob=repo.objects.get(e.hash); repo.work.set(e.name, blob?blob.content:''); } } }
    return {info:`Switched to branch '${name}'`};
  };
  api.merge=(name)=>{
    const target=repo.refs.get('refs/heads/'+name);
    if(target===undefined) return {err:`merge: ${name} - not something we can merge`};
    const cur=headCommit(); const br=curBranch();
    if(!cur){ repo.refs.set(repo.HEAD,target); return {info:`fast-forward to ${short(target)}`}; }
    if(cur===target) return {info:'Already up to date.'};
    const ancCur=ancestors(cur);
    if(ancCur.has(target)) return {info:'Already up to date.'};
    const ancTarget=ancestors(target);
    if(ancTarget.has(cur)){ // fast-forward
      if(br) repo.refs.set('refs/heads/'+br,target); else repo.HEAD={detached:target};
      return {info:`Fast-forward ${short(cur)}..${short(target)}`};
    }
    // true merge: new commit with two parents
    const o=repo.objects.get(cur);
    const ts=1700000000+(repo.clock++)*60;
    const body=`tree ${o.tree}\nparent ${cur}\nparent ${target}\nauthor You <you@local> ${ts} +0000\ncommitter You <you@local> ${ts} +0000\n\nMerge branch '${name}'\n`;
    const h=gitHashObject('commit',body);
    repo.objects.set(h,{type:'commit',tree:o.tree,parents:[cur,target],message:`Merge branch '${name}'`,ts,merge:true});
    if(br) repo.refs.set('refs/heads/'+br,h); else repo.HEAD={detached:h};
    return {info:`Merge made by a three-way merge strategy. ${short(h)}`};
  };
  api.log=()=>{
    let c=headCommit(); if(!c) return {info:'(no commits yet)'};
    const lines=[]; const seen=new Set();
    const stk=[c];
    const order=[];
    // simple: walk first-parent then others, collect unique, sort by ts desc
    (function walk(h){ if(!h||seen.has(h))return; seen.add(h); order.push(h); const o=repo.objects.get(h); if(o&&o.parents) o.parents.forEach(walk); })(c);
    order.sort((a,b)=>repo.objects.get(b).ts-repo.objects.get(a).ts);
    for(const h of order){ const o=repo.objects.get(h); const refs=[...repo.refs.entries()].filter(([k,v])=>v===h).map(([k])=>k.slice(11)); const head=(headCommit()===h)?' (HEAD)':''; lines.push(`* ${short(h)}${refs.length?' ('+refs.join(', ')+')':''}${head} ${o.message}`); }
    return {info:lines.join('\n')};
  };
  api.status=()=>{
    if(!repo.initialized) return {err:'not a git repository'};
    const br=curBranch()||'(detached)';
    const staged=[...repo.index.keys()];
    const untracked=[...repo.work.keys()].filter(f=>!repo.index.has(f) || gitHashObject('blob',repo.work.get(f))!==repo.index.get(f));
    let s=`On branch ${br}\n`;
    if(staged.length) s+='Changes to be committed:\n'+staged.map(f=>`  staged:    ${f}`).join('\n')+'\n';
    const modified=untracked.filter(f=>repo.index.has(f));
    const newfiles=untracked.filter(f=>!repo.index.has(f));
    if(modified.length) s+='Changes not staged:\n'+modified.map(f=>`  modified:  ${f}`).join('\n')+'\n';
    if(newfiles.length) s+='Untracked files:\n'+newfiles.map(f=>`  ${f}`).join('\n')+'\n';
    if(!staged.length&&!untracked.length) s+='nothing to commit, working tree clean';
    return {info:s.trim()};
  };
  api.catFile=(h)=>{
    // accept short hashes
    let full=h; if(!repo.objects.has(h)){ const m=[...repo.objects.keys()].filter(k=>k.startsWith(h)); if(m.length===1) full=m[0]; }
    const o=repo.objects.get(full); if(!o) return {err:`Not a valid object name ${h}`};
    if(o.type==='blob') return {info:o.content};
    if(o.type==='tree') return {info:o.entries.map(e=>`${e.mode} blob ${e.hash}\t${e.name}`).join('\n')};
    if(o.type==='commit') return {info:`tree ${o.tree}\n${o.parents.map(p=>'parent '+p).join('\n')}${o.parents.length?'\n':''}\n    ${o.message}`};
    return {info:JSON.stringify(o)};
  };
  api.hashObject=(name)=>{ if(!repo.work.has(name)) return {err:`could not open '${name}'`}; return {info:gitHashObject('blob',repo.work.get(name))}; };
  api.lsFiles=()=>({info:[...repo.index.keys()].join('\n')||'(index empty)'});
  api.headCommit=headCommit; api.curBranch=curBranch; api.ancestors=ancestors;
  return api;
}

/* ============================================================================
   PART C — GRAPH RENDERER (SVG)  for the live terminal
   ========================================================================== */
function renderGraph(git){
  const r=git.repo;
  const commits=[];
  const reach=new Set();
  for(const v of r.refs.values()) for(const a of git.ancestors(v)) reach.add(a);
  const hc=git.headCommit(); if(hc) for(const a of git.ancestors(hc)) reach.add(a);
  for(const h of reach){ const o=r.objects.get(h); if(o&&o.type==='commit') commits.push(h); }
  const MF='JetBrains Mono,monospace';
  if(!commits.length) return `<svg width="240" height="40"><text x="10" y="24" fill="#000" font-family="${MF}" font-size="12" font-weight="700">no commits yet — git commit</text></svg>`;
  // generation depth
  const gen=new Map(); function g(h){ if(gen.has(h))return gen.get(h); const o=r.objects.get(h); const v=(!o||!o.parents||!o.parents.length)?0:1+Math.max(...o.parents.map(g)); gen.set(h,v); return v; }
  commits.forEach(g);
  commits.sort((a,b)=> gen.get(b)-gen.get(a) || r.objects.get(b).ts-r.objects.get(a).ts);
  const rowH=46, x=60, r0=9; const H=commits.length*rowH+20, W=560;
  const pos=new Map(); commits.forEach((h,i)=>pos.set(h, {x, y:20+i*rowH}));
  let edges='', nodes='';
  for(const h of commits){ const o=r.objects.get(h); const p=pos.get(h);
    for(const par of (o.parents||[])){ const pp=pos.get(par); if(pp){ edges+=`<path d="M${p.x} ${p.y} C ${p.x} ${(p.y+pp.y)/2}, ${pp.x} ${(p.y+pp.y)/2}, ${pp.x} ${pp.y}" stroke="#000" stroke-width="2.5" fill="none"/>`; } }
  }
  for(const h of commits){ const o=r.objects.get(h); const p=pos.get(h);
    const isHead=git.headCommit()===h; const merge=o.parents&&o.parents.length>1;
    const refs=[...r.refs.entries()].filter(([k,v])=>v===h).map(([k])=>k.slice(11));
    nodes+=`<circle cx="${p.x}" cy="${p.y}" r="${r0}" fill="${merge?'#ccff00':'#fff'}" stroke="#000" stroke-width="${isHead?4:2.5}"/>`;
    nodes+=`<text x="${p.x+20}" y="${p.y-3}" fill="#000" font-family="${MF}" font-size="12" font-weight="700">${short(h)}</text>`;
    nodes+=`<text x="${p.x+20}" y="${p.y+12}" fill="#555" font-family="${MF}" font-size="11">${esc(o.message).slice(0,42)}</text>`;
    let lx=x-22;
    const labels=refs.map(rf=>({t:rf,bg:'#fff'}));
    if(isHead){ const cb=git.curBranch(); labels.unshift({t:'HEAD'+(cb?'':' (detached)'),bg:'#ccff00'}); }
    labels.forEach((lab)=>{ const w=lab.t.length*6.4+12; lx-=w+6; nodes+=`<rect x="${lx}" y="${p.y-10}" width="${w}" height="20" rx="0" fill="${lab.bg}" stroke="#000" stroke-width="2"/><text x="${lx+w/2}" y="${p.y+4}" fill="#000" font-family="${MF}" font-size="10" font-weight="700" text-anchor="middle">${lab.t}</text>`; });
  }
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${edges}${nodes}</svg>`;
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

const LS='gitiio_v1';
const State=(()=>{
  let s; try{ s=JSON.parse(localStorage.getItem(LS))||{}; }catch(e){ s={}; }
  s.done=s.done||{}; s.xp=s.xp||0; s.streak=s.streak||0; s.lastDay=s.lastDay||null; s.cards=s.cards||{};
  function save(){ try{localStorage.setItem(LS,JSON.stringify(s));}catch(e){} }
  function today(){ const d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
  function touchStreak(){ const t=today(); if(s.lastDay===t) return; const y=new Date(Date.now()-864e5); const yk=y.getFullYear()+'-'+(y.getMonth()+1)+'-'+y.getDate(); s.streak=(s.lastDay===yk)?s.streak+1:1; s.lastDay=t; save(); }
  return {
    s, save, touchStreak,
    markDone(id,xp){ if(!s.done[id]){ s.done[id]=true; s.xp+=(xp||50); touchStreak(); save(); } },
    isDone(id){return !!s.done[id];},
    addCard(id,front,back){ if(!s.cards[id]) s.cards[id]={front,back,box:1,due:0}; save(); },
    dueCards(){ const now=sessionTick; return Object.entries(s.cards).filter(([k,c])=>c.box<5 && c.due<=now); },
    gradeCard(id,ok){ const c=s.cards[id]; if(!c)return; if(ok){c.box=Math.min(5,c.box+1);}else{c.box=1;} c.due=sessionTick+(ok?c.box:0); save(); },
    reset(){ s.done={};s.xp=0;s.streak=0;s.lastDay=null;s.cards={}; save(); }
  };
})();

// ---- Terminal widget ----
function Terminal(opts){
  opts=opts||{}; const id=uid(); const git=MiniGit();
  if(opts.seed) opts.seed(git);
  const chips=(opts.chips||[]).map(c=>`<span class="chip" data-cmd="${esc(c)}">${esc(c)}</span>`).join('');
  const html=`<div class="widget term">
    <div class="widget-head"><span class="dots"><i></i><i></i><i></i></span><span class="lbl">simulated git terminal</span><span style="font-size:.7rem">${opts.note||'type real git commands'}</span></div>
    <div class="term-out" id="${id}-out"></div>
    <div class="term-in"><span>$</span><input id="${id}-in" autocomplete="off" spellcheck="false" placeholder="try: git init"></div>
    <div class="chiprow">${chips}<span class="chip" data-cmd="help">help</span><span class="chip" data-cmd="clear">clear</span></div>
    <div class="term-graph" id="${id}-graph"></div>
  </div>`;
  queueMicrotask(()=>{
    const out=document.getElementById(id+'-out'), inp=document.getElementById(id+'-in'), gr=document.getElementById(id+'-graph');
    const print=(t,cls)=>{ const d=document.createElement('div'); if(cls)d.className=cls; d.textContent=t; out.appendChild(d); out.scrollTop=out.scrollHeight; };
    const drawGraph=()=>{ gr.innerHTML=renderGraph(git); };
    function run(line){
      print(line,'cmd'); sessionTick++;
      const res=exec(line); if(res){ if(res.err)print(res.err,'err'); else if(res.info!==undefined && res.info!=='')print(res.info); }
      drawGraph();
    }
    function exec(line){
      const t=line.trim(); if(!t) return null;
      if(t==='clear'){ out.innerHTML=''; return null; }
      if(t==='help') return {info:'Commands:\n  git init | status | log\n  echo TEXT > FILE        (create a file)\n  git add FILE|.          git commit -m "msg"\n  git branch [name]       git checkout [-b] name\n  git merge name          git ls-files\n  git hash-object FILE     git cat-file -p HASH'};
      let m;
      if(m=t.match(/^echo\s+"?(.*?)"?\s*>\s*(\S+)$/)) return git.writeFile(m[2], m[1]+'\n');
      if(!t.startsWith('git ')) return {err:`command not found: ${t.split(' ')[0]} (this sim only knows git + echo)`};
      const a=t.slice(4).trim().split(/\s+/);
      switch(a[0]){
        case 'init': return git.init();
        case 'status': return git.status();
        case 'log': return git.log();
        case 'ls-files': return git.lsFiles();
        case 'add': return git.add(a[1]||'');
        case 'commit':{ const mm=t.match(/-m\s+"([^"]*)"/)||t.match(/-m\s+'([^']*)'/); if(!mm) return {err:'commit needs -m "message"'}; return git.commit(mm[1]); }
        case 'branch': return git.branch(a[1]);
        case 'checkout': if(a[1]==='-b') return git.checkout(a[2],true); return git.checkout(a[1]);
        case 'merge': return git.merge(a[1]);
        case 'hash-object': return git.hashObject(a[a.length-1]);
        case 'cat-file': return git.catFile(a[a.length-1]);
        default: return {err:`git: '${a[0]}' is not supported in this sim`};
      }
    }
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ run(inp.value); inp.value=''; } });
    document.getElementById(id).closest('.widget').querySelectorAll('.chip').forEach(ch=>{
      ch.addEventListener('click',()=>{ inp.value=ch.dataset.cmd; inp.focus(); });
    });
    if(opts.autorun) opts.autorun.forEach(run);
    drawGraph();
  });
  return html.replace('<div class="widget term">',`<div class="widget term" id="${id}">`);
}

// ---- Stepper widget (animated SVG scenes) ----
function Stepper(frames){
  const id=uid();
  const html=`<div class="widget stepper" id="${id}">
    <div class="widget-head"><span class="lbl">visualize</span><span style="font-size:.7rem">step through it →</span></div>
    <div id="${id}-svg"></div>
    <div class="step-cap" id="${id}-cap"></div>
    <div class="step-ctrl">
      <button class="btn" id="${id}-prev">‹ Prev</button>
      <button class="btn primary" id="${id}-next">Next ›</button>
      <button class="btn" id="${id}-play">▶ Play</button>
      <div class="pips" id="${id}-pips"></div>
      <span class="spacer" id="${id}-count"></span>
    </div></div>`;
  queueMicrotask(()=>{
    let i=0,timer=null;
    const svg=document.getElementById(id+'-svg'),cap=document.getElementById(id+'-cap'),count=document.getElementById(id+'-count'),pips=document.getElementById(id+'-pips');
    pips.innerHTML=frames.map(()=>'<i></i>').join('');
    function show(){ svg.innerHTML=frames[i].svg; cap.innerHTML=frames[i].cap; count.textContent=(i+1)+' / '+frames.length; [...pips.children].forEach((p,k)=>p.className=k===i?'on':''); }
    document.getElementById(id+'-next').onclick=()=>{ i=Math.min(frames.length-1,i+1); show(); };
    document.getElementById(id+'-prev').onclick=()=>{ i=Math.max(0,i-1); show(); };
    document.getElementById(id+'-play').onclick=function(){ if(timer){clearInterval(timer);timer=null;this.textContent='▶ Play';return;} this.textContent='⏸ Pause'; const btn=this; timer=setInterval(()=>{ if(i>=frames.length-1){clearInterval(timer);timer=null;btn.textContent='▶ Play';return;} i++;show(); },1400); };
    show();
  });
  return html;
}

// ---- Quiz widget ----
function Quiz(items){ // items: {q, type:'mc'|'text', options?, answer, explain, card?:[front,back]}
  const id=uid();
  const blocks=items.map((it,qi)=>{
    if(it.type==='text'){
      return `<div class="quiz" data-qi="${qi}"><div class="q">${it.q}</div>
        <div class="quiz-type"><input placeholder="type your answer…" data-input><button class="btn primary" data-check>Check</button></div>
        <div class="feedback"></div></div>`;
    }
    const opts=it.options.map((o,oi)=>`<button class="opt" data-oi="${oi}">${o}</button>`).join('');
    return `<div class="quiz" data-qi="${qi}"><div class="q">${it.q}</div>${opts}<div class="feedback"></div></div>`;
  }).join('<hr style="border:none;border-top:1px solid var(--border)">');
  const html=`<div class="widget" id="${id}"><div class="widget-head"><span class="lbl">✓ active recall</span><span style="font-size:.7rem">no peeking — guess first</span></div>${blocks}</div>`;
  queueMicrotask(()=>{
    document.querySelectorAll(`#${id} .quiz`).forEach(qz=>{
      const it=items[+qz.dataset.qi]; const fb=qz.querySelector('.feedback');
      function resolve(ok){
        fb.className='feedback show '+(ok?'ok':'no'); fb.innerHTML=(ok?'✅ ':'❌ ')+it.explain;
        if(it.card) State.addCard(id+'-'+qz.dataset.qi+(ok?'':'-x'), it.card[0], it.card[1]);
        if(!ok && it.card) updateDue();
      }
      if(it.type==='text'){
        const inp=qz.querySelector('[data-input]');
        qz.querySelector('[data-check]').onclick=()=>{
          const v=inp.value.trim().toLowerCase().replace(/\s+/g,' ');
          const ans=(Array.isArray(it.answer)?it.answer:[it.answer]).map(a=>a.toLowerCase());
          resolve(ans.some(a=>v===a||v.includes(a)));
        };
        inp.addEventListener('keydown',e=>{if(e.key==='Enter')qz.querySelector('[data-check]').click();});
      } else {
        qz.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
          const oi=+b.dataset.oi; const ok=oi===it.answer;
          qz.querySelectorAll('.opt').forEach((x,xi)=>{ x.disabled=true; if(xi===it.answer)x.classList.add('correct'); else if(xi===oi)x.classList.add('wrong'); });
          resolve(ok);
        });
      }
    });
  });
  return html;
}

{id:'cas',part:'II · How Git Stores Things',title:'4 · Content-addressable storage',xp:60,render:()=>`
  <div class="lesson-tag">Part II · Lesson 4 · the big one</div>
  <h2>Content-addressable storage & blobs</h2>
  <p class="lead">Here is the idea the entire system is built on. Go slow. This is the lever that moves the world.</p>

  <p>Normally you store a file <i>by its name</i> and ask "what's inside <code>report.txt</code>?". Git flips this around. Git stores content <b>by a fingerprint of the content itself</b>, and asks "give me the thing whose fingerprint is <code>ce01362…</code>".</p>
  <p>That fingerprint is a <b>SHA-1 hash</b>: feed in any bytes, get out a fixed 40-character hex string. Same bytes → same hash, always. Different bytes → (essentially always) a different hash.</p>

  <div class="callout aha"><span class="k">git's exact recipe for a blob</span>To store a file's contents (a "blob"), git does <b>not</b> hash the raw bytes alone. It hashes:<br><code>"blob " + &lt;byte-length&gt; + "\\0" + &lt;contents&gt;</code><br>That little header is the whole secret. Let's prove it produces a <i>real</i> git hash.</div>

  <h3>Compute a real git hash, right now</h3>
  <p>The playground below uses the <b>same SHA-1 implementation that powers this whole site</b>, verified against the actual <code>git</code> binary. Run it. The hash you get for <code>"hello\\n"</code> is byte-for-byte what <code>git hash-object</code> prints on a real machine.</p>
  ${Playground({code:`// git's blob recipe: sha1("blob " + len + "\\0" + content)
const content = "hello\\n";
const hash = gitHashObject("blob", content);
log("content :", JSON.stringify(content));
log("git hash:", hash);
log("");
log("Run 'printf \\"hello\\\\n\\" | git hash-object --stdin'");
log("on any real machine — you'll get the SAME hash:");
log("ce013625030ba8dba906f756967f9e9ca394464a");`, note:'this is real — try changing the content'})}

  ${Predict('Change the content to <code>"hello"</code> (no newline). Will the hash change a little, or completely?',
    'Completely. Hashes have no notion of "close." Flip one bit and ~half the output bits flip — the <b>avalanche effect</b>. This is exactly why Git can use a hash as an identity: if two hashes match, Git treats the contents as identical; if they differ at all, the hash is totally different. There\'s no "almost the same object." <i>(Cryptographically, SHA-1 collisions are possible — which is why modern Git adds collision detection and supports SHA-256. In everyday use, matching hash = same content.)</i>')}

  <div class="callout"><span class="k">two consequences you get for free</span>
  <b>1. Automatic deduplication.</b> Commit the same file in 100 commits → it's stored <i>once</i>, because it always hashes to the same address. (Remember Lesson 1's "snapshots are cheap"? This is why.)<br>
  <b>2. Built-in integrity.</b> If a stored byte ever corrupts, its content no longer matches its hash-address — git notices instantly.</div>

  ${Quiz([
    {q:'Git addresses stored content by…', options:['Its filename','A hash of its contents','Its creation timestamp'], answer:1, explain:'Content-addressable: the address IS the hash of the content. Same content → same address → stored once.', card:['How does git address stored objects?','By the SHA-1 hash of their contents (content-addressable).']},
    {q:'Before hashing a file\'s contents, git prepends a header. What is it (roughly)?', type:'text', answer:['blob','blob len','blob length','blob size'], explain:'"blob <length>\\0" then the content. The type+length header is part of what gets hashed.', card:['What header does git hash before a blob\'s content?','"blob <byte-length>\\0"']},
    {q:'Two files with identical contents but different names are stored as…', options:['Two separate objects','One single object','It depends on the folder'], answer:1, explain:'Content-addressable storage cares only about content. One object, shared.'}
  ])}
  <div class="cliff"><span class="k">open loop</span><p style="margin:.3em 0 0">A blob stores a file's <i>contents</i> — but notice it stored no filename! So where do filenames and folder structure live? In a second kind of object…</p></div>
`},

{id:'trees',part:'II · How Git Stores Things',title:'5 · Trees (directories)',xp:55,render:()=>`
  <div class="lesson-tag">Part II · Lesson 5</div>
  <h2>Trees: how git remembers structure</h2>
  <p class="lead">Blobs hold contents but no names. A <b>tree</b> object is git's version of a directory: a list mapping names → the hash of a blob (file) or another tree (subfolder).</p>
  ${Stepper([
    frame(treeSVG(0),'A <b>tree</b> is just a list of entries. Each entry = <code>mode · name · hash</code>. Here the tree has one entry: <code>greeting.txt → ce01362…</code> (a blob).'),

    frame(treeSVG(2),'So a full project snapshot is one <b>root tree</b> that (transitively) names every file via blobs. <i>This</i> is the "snapshot" from Lesson 1.'),
  ])}

  <div class="callout aha"><span class="k">the tree itself has a hash too</span>A tree is content, so it's content-addressable just like a blob. Its hash is computed over its sorted entries (each: <code>mode name\\0</code> + the entry's <i>raw</i> hash bytes). Change any file → its blob hash changes → the tree containing it gets a new hash → all the way up to the root. The root tree's hash is a fingerprint of your <i>entire</i> project state.</div>

  <h3>Build a real tree hash</h3>
  <p>Below we hash a blob, then a tree containing it. Both match real git exactly (verified against <code>git write-tree</code>).</p>
  ${Playground({code:`// 1) hash the file content as a blob

log("blob greeting.txt:", blob);

// 2) build a tree with one entry pointing at that blob
const tree = gitHashTree([
  { mode: "100644", name: "greeting.txt", hash: blob }
]);
log("tree hash       :", tree);
log("");
log("Real git produces this exact tree: 57e9529754dc514a3ec10db2ff882018fbe1fcbf");`, note:'add another entry and watch the tree hash change'})}

  ${Quiz([

  ])}
  <div class="cliff"><span class="k">open loop</span><p style="margin:.3em 0 0">A root tree captures <i>what</i> the project looks like. But it has no author, no date, no message, and no link to what came before. Wrap it in one more object and you get… a commit.</p></div>

  <div class="lesson-tag">Part II · Lesson 7</div>
  <h2>The commit graph (DAG)</h2>

    frame(dagSVG(2),'<code>C3</code> continues the chain. A straight line so far — this is a linear history.'),
    frame(dagSVG(3),'Branch off <code>C2</code> and commit: <code>C4</code> also has <code>C2</code> as parent. Now <code>C2</code> has two children — the graph forks.'),

  <h2>Packfiles & deltas: staying small</h2>
  <p class="lead">Content-addressing dedups <i>identical</i> objects. But two versions of a big file that differ by one line are two different objects → two different hashes → stored separately. Wouldn't that bloat? Git's answer: packfiles.</p>

  <div class="lesson-tag">Part V · Lesson 16 · the payoff</div>
  <h2>Build your own version control, step by step</h2>
  <p class="lead">Each cell below adds one piece. Run them in order. By the last cell you'll have a working VCS that produces <b>real git-compatible hashes</b>. You're given <code>gitHashObject</code> and <code>gitHashTree</code> (the verified primitives from Part II) — everything else, you assemble.</p>

  <h3>Step 1 — <code>hashObject</code>: store a blob</h3>
  <p>The foundation: take content, return its address. (This is <code>git hash-object -w</code>.)</p>
  ${Playground({code:`// A minimal object store + hashObject.
const objects = new Map();

function hashObject(type, content) {
  const h = gitHashObject(type, content);   // verified primitive
  objects.set(h, { type, content });
  return h;
}

const h = hashObject("blob", "hello\\n");
log("stored blob at:", h);
log("matches real git:", h === "ce013625030ba8dba906f756967f9e9ca394464a");`})}

  <h3>Step 2 — <code>writeTree</code>: snapshot a set of files</h3>
  <p>Turn a {filename: content} map into a tree object.</p>
  ${Playground({code:`const objects = new Map();
function hashObject(type, content){ const h=gitHashObject(type,content); objects.set(h,{type,content}); return h; }

function writeTree(files) {            // files: {name: content}
  const entries = Object.entries(files).map(([name, content]) => ({
    mode: "100644",
    name,
    hash: hashObject("blob", content)  // each file becomes a blob
  }));
  const treeHash = gitHashTree(entries);
  objects.set(treeHash, { type:"tree", entries });
  return treeHash;
}

  <h3>Step 3 — <code>commitTree</code>: wrap a tree in a commit</h3>
  ${Playground({code:`const objects = new Map();
function hashObject(type, content){ const h=gitHashObject(type,content); objects.set(h,{type,content}); return h; }

function commitTree(tree, parent, message, ts) {
  const body =
    "tree " + tree + "\\n" +
    (parent ? "parent " + parent + "\\n" : "") +
    "author You <you@local> " + ts + " +0000\\n" +
    "committer You <you@local> " + ts + " +0000\\n" +

  ${Playground({code:`// ===== minigit: a working version-control engine in ~25 lines =====
const objects = new Map();          // hash -> object   (the bag)
const refs = new Map();             // branch -> commit hash

  ['blob','tree','commit'].forEach((t,i)=>{ s+=box(140+i*170,185,120,45,'#0d1117','#58a6ff')+txt(200+i*170,212,t,'#e6edf3',13,'middle'); });
  s+=box(180,40,360,70,'#1c2330','#3fb950',10)+txt(360,30,'REFS  (pointers into the store)','#3fb950',13,'middle','bold');
  ['HEAD','branches','tags'].forEach((t,i)=>{ s+=box(210+i*120,62,90,34,'#0d1117','#3fb950')+txt(255+i*120,84,t,'#e6edf3',12,'middle'); });
  s+=arrow(360,110,360,158,'#ffa657');
  s+=txt(360,135,'point to','#ffa657',11,'middle');
  return wrapSVG(s);
}

/* ============================================================================
   PART H — APP SHELL: routing, nav, progress, flashcards
   ========================================================================== */
const main=document.getElementById('main'), nav=document.getElementById('nav');
let currentIdx=0;

function buildNav(){
  let html='', lastPart=null;
  LESSONS.forEach((L,i)=>{
    if(L.part!==lastPart){ html+=`<div class="part">${L.part}</div>`; lastPart=L.part; }
    const done=State.isDone(L.id);
    html+=`<a data-i="${i}" class="${i===currentIdx?'active':''} ${done?'done':''}"><span class="dot">${done?'✓':''}</span>${L.title}</a>`;
  });
  nav.innerHTML=html;
  nav.querySelectorAll('a').forEach(a=>a.onclick=()=>go(+a.dataset.i));
}
function go(i){
  currentIdx=Math.max(0,Math.min(LESSONS.length-1,i));
  const L=LESSONS[currentIdx];
  sessionTick++;
  const isDone=State.isDone(L.id);
  const completeBtn = L.id==='capstone-reveal' ? '' :
    `<div class="complete-bar"><div class="txt">${isDone?'<span style="color:var(--green)">✓ Lesson complete</span> — revisit anytime.':'Finished this lesson? Lock it in.'}</div>
     <button class="btn ${isDone?'':'primary'}" id="markBtn">${isDone?'✓ Completed (+'+L.xp+' XP)':'Mark complete +'+L.xp+' XP'}</button></div>`;
  const prev = currentIdx>0?`<button class="btn" id="prevBtn">‹ ${LESSONS[currentIdx-1].title}</button>`:'<span></span>';
  const next = currentIdx<LESSONS.length-1?`<button class="btn primary" id="nextBtn">${LESSONS[currentIdx+1].title} ›</button>`:'<span></span>';
  main.innerHTML = L.render() + completeBtn + `<div class="pagebtns">${prev}${next}</div>`;
  main.scrollTop=0; window.scrollTo(0,0);
  const mb=document.getElementById('markBtn'); if(mb) mb.onclick=()=>{ State.markDone(L.id,L.xp); refreshStats(); buildNav(); go(currentIdx); };
  const pb=document.getElementById('prevBtn'); if(pb) pb.onclick=()=>go(currentIdx-1);
  const nb=document.getElementById('nextBtn'); if(nb) nb.onclick=()=>go(currentIdx+1);
  const sh=document.getElementById('shareHint'); if(sh) sh.onclick=(e)=>{e.preventDefault(); alert('This entire course is one self-contained .html file.\\n\\nTo share: just send the file (email, Slack, USB, anything).\\nIt runs offline in any modern browser — no server, no install, no account.\\n\\nProgress is saved per-browser via localStorage.');};
  buildNav();
  refreshStats();
}
function refreshStats(){
  document.getElementById('xp').textContent=State.s.xp;
  document.getElementById('streak').textContent=State.s.streak;
  const total=LESSONS.length, done=LESSONS.filter(L=>State.isDone(L.id)).length;
  const pct=Math.round(done/total*100);
  const ring=document.getElementById('ring'); ring.style.setProperty('--p',pct); document.getElementById('ringTxt').textContent=pct+'%';
  const due=State.dueCards().length; const dc=document.getElementById('dueCount'); dc.textContent=due;
}

/* ---- Flashcard review modal ---- */
const modal=document.getElementById('cardModal');
let reviewQueue=[], reviewCur=null;
function openReview(){
  reviewQueue=State.dueCards().map(([id,c])=>({id,...c}));
  if(!reviewQueue.length){ alert('No cards due right now! 🎉\\n\\nMissed quiz questions become flashcards and resurface here as you keep studying (spaced repetition).'); return; }
  modal.classList.add('show'); nextCard();
}
function nextCard(){
  if(!reviewQueue.length){ modal.classList.remove('show'); refreshStats(); return; }
  reviewCur=reviewQueue.shift();
  document.getElementById('cardBox').textContent='box '+reviewCur.box+' / 5';
  document.getElementById('cardFront').innerHTML=reviewCur.front;
  const back=document.getElementById('cardBack'); back.innerHTML=reviewCur.back; back.classList.remove('show');
  const row=document.getElementById('cardRow');
  row.innerHTML='<button class="btn primary" id="cardFlip">Flip card</button>';
  document.getElementById('cardFlip').onclick=showBack;
}
function showBack(){
  document.getElementById('cardBack').classList.add('show');
  const row=document.getElementById('cardRow');
  row.innerHTML='<button class="btn" id="cardAgain">😕 Again</button><button class="btn primary" id="cardGood">😎 Got it</button>';
  document.getElementById('cardAgain').onclick=()=>{ State.gradeCard(reviewCur.id,false); reviewQueue.push({...reviewCur,box:1}); sessionTick++; nextCard(); };
  document.getElementById('cardGood').onclick=()=>{ State.gradeCard(reviewCur.id,true); sessionTick+=2; nextCard(); };
}
document.getElementById('reviewBtn').onclick=openReview;
modal.onclick=(e)=>{ if(e.target===modal) modal.classList.remove('show'); };

/* ---- boot ---- */
buildNav(); go(0); refreshStats();
</script>
